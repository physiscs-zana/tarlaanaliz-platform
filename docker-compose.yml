# =============================================================================
# docker-compose.yml — Yerel gelistirme ortami orkestrasyonu
# PostgreSQL, RabbitMQ, Redis, Backend ve Frontend servisleri
# Sadece dev/test ortami icindir; prod'da kullanilmaz.
# =============================================================================

services:
  # --- PostgreSQL (PostGIS destekli) ---
  postgres:
    image: postgis/postgis:16-3.4
    container_name: tarlaanaliz-db
    # SEC-FIX: credentials moved to .env file
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tarlaanaliz}
      POSTGRES_USER: ${POSTGRES_USER:-tarlaanaliz_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required in .env}
    ports:
      # SEC-FIX: bind to localhost only (was 0.0.0.0)
      - "127.0.0.1:5432:5432"    # PostgreSQL
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tarlaanaliz_user -d tarlaanaliz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tarlaanaliz-net

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: tarlaanaliz-redis
    # SEC-FIX: Redis password authentication enabled
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
        redis-server --requirepass "$$REDIS_PASSWORD";
      else
        redis-server;
      fi'
    env_file:
      - .env
    ports:
      # SEC-FIX: bind to localhost only
      - "127.0.0.1:6379:6379"    # Redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tarlaanaliz-net

  # --- RabbitMQ ---
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: tarlaanaliz-rabbitmq
    # SEC-FIX: credentials moved to .env file
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-tarlaanaliz}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD required in .env}
      RABBITMQ_DEFAULT_VHOST: /tarlaanaliz
    ports:
      # SEC-FIX: bind to localhost only
      - "127.0.0.1:5672:5672"     # RabbitMQ AMQP
      - "127.0.0.1:15672:15672"   # RabbitMQ Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - tarlaanaliz-net

  # --- MinIO (S3-uyumlu object storage) ---
  minio:
    # SEC-FIX: pinned from :latest to specific version
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: tarlaanaliz-minio
    command: server /data --console-address ":9001"
    # SEC-FIX: credentials moved to .env file
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required in .env}
    ports:
      # SEC-FIX: bind to localhost only
      - "127.0.0.1:9000:9000"    # MinIO S3 API
      - "127.0.0.1:9001:9001"    # MinIO Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - tarlaanaliz-net

  # --- Backend (FastAPI) ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tarlaanaliz-backend
    env_file:
      - .env
    environment:
      # --- pydantic-settings reads TARLA_ prefix ---
      TARLA_ENVIRONMENT: production
      TARLA_DB_HOST: postgres
      TARLA_DB_PORT: "5432"
      TARLA_DB_USER: ${POSTGRES_USER:-tarlaanaliz_user}
      TARLA_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      TARLA_DB_NAME: ${POSTGRES_DB:-tarlaanaliz}
      TARLA_REDIS_HOST: redis
      TARLA_REDIS_PORT: "6379"
      TARLA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      TARLA_RABBITMQ_HOST: rabbitmq
      TARLA_RABBITMQ_USER: ${RABBITMQ_USER:-tarlaanaliz}
      TARLA_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD required}
      TARLA_S3_ENDPOINT_URL: http://minio:9000
      TARLA_S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      TARLA_S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required}
      TARLA_JWT_SECRET_KEY: ${APP_SECRET_KEY:?APP_SECRET_KEY required}
      TARLA_CORS_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      # --- non-prefixed (for other tools) ---
      APP_ENV: production
      API_JWT_SECRET: ${APP_SECRET_KEY:?APP_SECRET_KEY required}
      API_CORS_ALLOW_ORIGINS: "https://tarlaanaliz.com,https://www.tarlaanaliz.com"
      API_CORS_ALLOW_CREDENTIALS: "true"
    ports:
      # SEC-FIX: bind to localhost only
      - "127.0.0.1:8000:8000"    # FastAPI backend
    volumes:
      - ./src:/app/src:ro
      - ./alembic:/app/alembic:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - tarlaanaliz-net

  # --- Frontend (Next.js PWA) ---
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.tarlaanaliz.com/api/v1}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://api.tarlaanaliz.com/ws}
    container_name: tarlaanaliz-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.tarlaanaliz.com/api/v1}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://api.tarlaanaliz.com/ws}
    ports:
      # Host nginx proxies tarlaanaliz.com → localhost:3000
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - tarlaanaliz-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  minio_data:
    driver: local

networks:
  tarlaanaliz-net:
    driver: bridge
