# =============================================================================
# Host nginx config — /etc/nginx/sites-enabled/tarlaanaliz
# tarlaanaliz.com     → Next.js frontend (localhost:3000)
# api.tarlaanaliz.com → FastAPI backend  (localhost:8000)
# =============================================================================

# [H-4] Hide nginx version
server_tokens off;

# [FIX-5] Default server — reject requests via IP or unknown Host header.
# Prevents redirect loop to https://IP which has no valid certificate.
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    server_name _;
    ssl_certificate /etc/letsencrypt/live/tarlaanaliz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tarlaanaliz.com/privkey.pem;
    return 444;
}

# [C-3] HTTP → HTTPS redirect (both domains)
server {
    listen 80;
    server_name tarlaanaliz.com www.tarlaanaliz.com api.tarlaanaliz.com;
    return 301 https://$host$request_uri;
}

# --- Frontend: tarlaanaliz.com (HTTPS only) ---
server {
    listen 443 ssl;
    server_name tarlaanaliz.com www.tarlaanaliz.com;

    ssl_certificate /etc/letsencrypt/live/tarlaanaliz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tarlaanaliz.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # [FIX-2] Proxy /api/ requests to FastAPI backend (same-origin, no CORS needed)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host api.tarlaanaliz.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        client_max_body_size 100m;

        proxy_hide_header X-Correlation-Id;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Cache Next.js static assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}

# --- Backend API: api.tarlaanaliz.com (HTTPS only) ---
server {
    listen 443 ssl;
    server_name api.tarlaanaliz.com;

    ssl_certificate /etc/letsencrypt/live/tarlaanaliz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tarlaanaliz.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100m;

    # [H-2] Health check — only return status, hide internals
    location = /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Correlation-Id;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # [M-4] Hide internal correlation ID from external responses
        proxy_hide_header X-Correlation-Id;
    }
}
